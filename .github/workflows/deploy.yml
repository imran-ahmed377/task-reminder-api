name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  AZURE_WEBAPP_NAME: 'task-reminder-api'  # Change this to your Azure app name

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx
    
    - name: Start FastAPI server
      run: |
        uvicorn main:app --host 0.0.0.0 --port 8001 > /tmp/server.log 2>&1 &
        echo $! > /tmp/server.pid
    
    - name: Wait for API server to start
      run: |
        for i in {1..30}; do
          if nc -z localhost 8001; then
            echo "✅ API server is running!"
            break
          fi
          echo "Waiting for API server... ($i/30)"
          sleep 1
        done
    
    - name: Run tests
      run: |
        python -m pytest test_api.py -v
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

  deploy:
    name: Deploy to Azure
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Zip application
      run: |
        zip -r deploy.zip . -x ".git/*" ".github/*" "venv/*" "__pycache__/*" "*.pyc" ".pytest_cache/*"
    
    - name: Deploy to Azure
      run: |
        # Decode credentials from the publish profile secret
        PUBLISH_PROFILE='${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}'
        
        # Extract username and password
        USERNAME=$(echo "$PUBLISH_PROFILE" | grep -oP 'userName="\K[^"]+' | head -1)
        PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -oP 'userPWD="\K[^"]+' | head -1)
        
        # Extract the Zip Deploy URL from publish profile
        DEPLOY_URL=$(echo "$PUBLISH_PROFILE" | grep 'ZipDeploy' | grep -oP 'publishUrl="\K[^"]+')
        
        echo "Deploying to: $DEPLOY_URL"
        
        # Upload zip file
        curl -X POST \
          -u "$USERNAME:$PASSWORD" \
          --data-binary @deploy.zip \
          "https://${DEPLOY_URL}/api/zipdeploy" \
          -H "Content-Type: application/octet-stream" || {
            echo "Deployment upload failed"
            exit 1
          }
        
        echo "Deployment completed successfully"
    
    - name: Verify Deployment
      run: |
        sleep 30
        curl -s https://task-reminder-api.azurewebsites.net/api/health | head -20

