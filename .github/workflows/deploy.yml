name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.11'
  AZURE_WEBAPP_NAME: 'task-reminder-api'  # Change this to your Azure app name

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx
    
    - name: Start FastAPI server
      run: |
        uvicorn main:app --host 0.0.0.0 --port 8001 > /tmp/server.log 2>&1 &
        echo $! > /tmp/server.pid
    
    - name: Wait for API server to start
      run: |
        for i in {1..30}; do
          if nc -z localhost 8001; then
            echo "✅ API server is running!"
            break
          fi
          echo "Waiting for API server... ($i/30)"
          sleep 1
        done
    
    - name: Run tests
      run: |
        python -m pytest test_api.py -v
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

  deploy:
    name: Deploy to Azure
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Package application
      run: |
        zip -r app.zip . -x ".git/*" ".github/*" "venv/*" "__pycache__/*" "*.pyc"
    
    - name: Deploy via Zip Deploy
      run: |
        PUBLISH_PROFILE='${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}'
        echo "Publish profile received (length: ${#PUBLISH_PROFILE})"
        
        # Extract credentials using sed (more reliable)
        USERNAME=$(echo "$PUBLISH_PROFILE" | sed -n 's/.*userName="\([^"]*\)".*/\1/p' | head -1)
        PASSWORD=$(echo "$PUBLISH_PROFILE" | sed -n 's/.*userPWD="\([^"]*\)".*/\1/p' | head -1)
        PUBLISH_URL=$(echo "$PUBLISH_PROFILE" | grep 'ZipDeploy' | sed -n 's/.*publishUrl="\([^"]*\)".*/\1/p')
        
        echo "Username extracted: $(if [ -z "$USERNAME" ]; then echo "FAILED"; else echo "OK"; fi)"
        echo "Password extracted: $(if [ -z "$PASSWORD" ]; then echo "FAILED"; else echo "OK"; fi)"
        echo "Publish URL: $PUBLISH_URL"
        
        # Verify extraction
        if [ -z "$USERNAME" ] || [ -z "$PASSWORD" ] || [ -z "$PUBLISH_URL" ]; then
          echo "❌ Failed to extract credentials from publish profile"
          echo "Profile content sample (first 200 chars): ${PUBLISH_PROFILE:0:200}"
          exit 1
        fi
        
        # Deploy
        echo "Starting deployment..."
        curl -v -X POST -u "$USERNAME:$PASSWORD" --data-binary @app.zip "https://$PUBLISH_URL/api/zipdeploy" || {
          echo "❌ Deployment failed"
          exit 1
        }
        echo "✅ Deployment completed"
    
    - name: Deployment Notification
      if: always()
      run: |
        if [ ${{ job.status }} = 'success' ]; then
          echo "✅ Deployment successful!"
        else
          echo "❌ Deployment failed!"
        fi
