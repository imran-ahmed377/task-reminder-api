# This file tells Azure App Service how to build and deploy the Python app

[build]
runtime = "python"
runtimeVersion = "3.11"

[buildScript]
command = "pip install --upgrade pip && pip install --upgrade setuptools && pip install -r requirements.txt"

[startupScript]
command = "gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"
