<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task & Reminder API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 30px;
            margin-bottom: 20px;
        }

        .auth-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="date"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        button.danger {
            background: #ff6b6b;
        }

        button.danger:hover {
            background: #ff5252;
        }

        button.success {
            background: #51cf66;
        }

        button.success:hover {
            background: #40c057;
        }

        button.secondary {
            background: #868e96;
        }

        button.secondary:hover {
            background: #748083;
        }

        .auth-status {
            text-align: right;
            margin-bottom: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }

        .user-info {
            color: #667eea;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        .alert {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .task-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        .task-item.completed {
            opacity: 0.6;
            border-left-color: #51cf66;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 5px;
            color: #333;
        }

        .task-description {
            color: #666;
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        .task-meta {
            font-size: 0.85em;
            color: #999;
        }

        .task-due-date {
            color: #e74c3c;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            margin-left: 15px;
        }

        .task-actions button {
            padding: 8px 12px;
            font-size: 0.9em;
        }

        .tasks-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .section-title {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        @media (max-width: 768px) {
            .auth-section {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .task-item {
                flex-direction: column;
            }

            .task-actions {
                margin-left: 0;
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📋 Task Manager</h1>
            <p>Student Task & Reminder API - Web Interface</p>
        </div>

        <div class="card">
            <div class="auth-status" id="authStatus">
                <span>Not logged in</span>
            </div>

            <div id="alertContainer"></div>

            <!-- Auth Section -->
            <div id="authSection">
                <h2 class="section-title">Authentication</h2>
                <div class="auth-section">
                    <!-- Register Form -->
                    <div>
                        <h3 style="margin-bottom: 15px; color: #667eea;">Register</h3>
                        <div class="form-group">
                            <label for="registerUsername">Username</label>
                            <input type="text" id="registerUsername" placeholder="johndoe">
                        </div>
                        <div class="form-group">
                            <label for="registerEmail">Email</label>
                            <input type="email" id="registerEmail" placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label for="registerPassword">Password</label>
                            <input type="password" id="registerPassword" placeholder="secure password">
                        </div>
                        <button onclick="register()">Register</button>
                    </div>

                    <!-- Login Form -->
                    <div>
                        <h3 style="margin-bottom: 15px; color: #667eea;">Login</h3>
                        <div class="form-group">
                            <label for="loginUsername">Username</label>
                            <input type="text" id="loginUsername" placeholder="johndoe">
                        </div>
                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <input type="password" id="loginPassword" placeholder="password">
                        </div>
                        <button onclick="login()">Login</button>
                    </div>
                </div>
            </div>

            <!-- Tasks Section (Hidden until logged in) -->
            <div id="tasksSection" class="hidden" style="margin-top: 30px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h2 class="section-title" style="margin: 0; border: none;">My Tasks</h2>
                    <button onclick="logout()" class="secondary">Logout</button>
                </div>

                <!-- Create Task Form -->
                <div style="background: #f0f0f0; padding: 20px; border-radius: 5px; margin-bottom: 20px;">
                    <h3 style="margin-bottom: 15px; color: #333;">Create New Task</h3>
                    <div class="form-group">
                        <label for="taskTitle">Task Title *</label>
                        <input type="text" id="taskTitle" placeholder="Enter task title" required>
                    </div>
                    <div class="form-group">
                        <label for="taskDescription">Description</label>
                        <textarea id="taskDescription" placeholder="Enter task description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="taskDueDate">Due Date</label>
                        <input type="date" id="taskDueDate">
                    </div>
                    <button onclick="createTask()" style="width: 100%;">Add Task</button>
                </div>

                <!-- Tasks List -->
                <h3 style="margin-bottom: 15px; color: #333;">Tasks</h3>
                <div id="tasksList" class="tasks-list">
                    <div class="empty-state">
                        <p>No tasks yet. Create one above!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Detect API URL dynamically
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8001'
            : `https://${window.location.host}`;
        const WS_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'ws://localhost:8001'
            : `wss://${window.location.host}`;
        let token = localStorage.getItem('token');
        let ws = null;
        let editingTaskId = null;  // Track which task is being edited

        // Initialize on page load
        window.addEventListener('load', () => {
            if (token) {
                showTasksSection();
                loadTasks();
                connectWebSocket();
            } else {
                showAuthSection();
            }
        });

        // WebSocket Connection for Real-time Updates
        function connectWebSocket() {
            if (!token) return;

            ws = new WebSocket(`${WS_URL}/ws/${token}`);

            ws.onopen = () => {
                console.log('WebSocket connected');
                // Keep connection alive
                setInterval(() => {
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'ping' }));
                    }
                }, 30000);
            };

            ws.onmessage = (event) => {
                const message = JSON.parse(event.data);
                handleRealtimeUpdate(message);
            };

            ws.onerror = (error) => {
                console.log('WebSocket error:', error);
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                // Attempt to reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };
        }

        // Handle Real-time Updates
        function handleRealtimeUpdate(message) {
            const { type, data } = message;

            switch (type) {
                case 'task_created':
                    addTaskToUI(data);
                    showAlert('New task created!', 'success');
                    break;
                case 'task_updated':
                    updateTaskInUI(data);
                    showAlert('Task updated!', 'success');
                    break;
                case 'task_deleted':
                    removeTaskFromUI(data.id);
                    showAlert('Task deleted!', 'success');
                    break;
            }
        }

        // Add task to UI without reload
        function addTaskToUI(task) {
            const tasksList = document.getElementById('tasksList');

            // Remove empty state if exists
            const emptyState = tasksList.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const taskEl = document.createElement('div');
            taskEl.className = `task-item ${task.is_completed ? 'completed' : ''}`;
            taskEl.id = `task-${task.id}`;
            taskEl.innerHTML = `
                <div class="task-content">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                    <div class="task-meta">
                        ${task.due_date ? `<span class="task-due-date">📅 Due: ${task.due_date}</span>` : ''}
                        ${task.due_date ? ' • ' : ''}
                        <span>Created: ${new Date(task.created_at).toLocaleDateString()}</span>
                    </div>
                </div>
                <div class="task-actions">
                    ${!task.is_completed ? `<button class="success" onclick="completeTask(${task.id})">✓ Complete</button>` : ''}
                    <button onclick="editTask(${task.id})">Edit</button>
                    <button class="danger" onclick="deleteTask(${task.id})">Delete</button>
                </div>
            `;
            tasksList.appendChild(taskEl);
        }

        // Update task in UI
        function updateTaskInUI(task) {
            const taskEl = document.getElementById(`task-${task.id}`);
            if (!taskEl) {
                loadTasks();
                return;
            }

            taskEl.className = `task-item ${task.is_completed ? 'completed' : ''}`;
            taskEl.innerHTML = `
                <div class="task-content">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                    <div class="task-meta">
                        ${task.due_date ? `<span class="task-due-date">📅 Due: ${task.due_date}</span>` : ''}
                        ${task.due_date ? ' • ' : ''}
                        <span>Created: ${new Date(task.created_at).toLocaleDateString()}</span>
                    </div>
                </div>
                <div class="task-actions">
                    ${!task.is_completed ? `<button class="success" onclick="completeTask(${task.id})">✓ Complete</button>` : ''}
                    <button onclick="editTask(${task.id})">Edit</button>
                    <button class="danger" onclick="deleteTask(${task.id})">Delete</button>
                </div>
            `;
        }

        // Remove task from UI
        function removeTaskFromUI(taskId) {
            const taskEl = document.getElementById(`task-${taskId}`);
            if (taskEl) {
                taskEl.remove();

                // Check if list is empty
                const tasksList = document.getElementById('tasksList');
                if (tasksList.children.length === 0) {
                    tasksList.innerHTML = '<div class="empty-state"><p>No tasks yet. Create one above!</p></div>';
                }
            }
        }

        // Show/Hide sections
        function showAuthSection() {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('tasksSection').classList.add('hidden');
            updateAuthStatus();
            if (ws) ws.close();
        }

        function showTasksSection() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('tasksSection').classList.remove('hidden');
            updateAuthStatus();
        }

        function updateAuthStatus() {
            const statusEl = document.getElementById('authStatus');
            if (token) {
                statusEl.innerHTML = '<span class="user-info">✓ Logged in</span>';
            } else {
                statusEl.innerHTML = '<span>Not logged in</span>';
            }
        }

        // Alert Management
        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            const alertEl = document.createElement('div');
            alertEl.className = `alert ${type} show`;
            alertEl.textContent = message;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertEl);

            setTimeout(() => {
                alertEl.classList.remove('show');
            }, 5000);
        }

        // API Helper
        async function apiCall(method, endpoint, body = null) {
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json'
                }
            };

            if (token) {
                options.headers['Authorization'] = `Bearer ${token}`;
            }

            if (body) {
                options.body = JSON.stringify(body);
            }

            try {
                const response = await fetch(`${API_URL}${endpoint}`, options);

                // Handle 204 No Content (successful delete)
                if (response.status === 204) {
                    return { success: true, data: {} };
                }

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'API Error');
                }

                return { success: true, data };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        // Auth Functions
        async function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;

            if (!username || !email || !password) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            const result = await apiCall('POST', '/auth/register', {
                username,
                email,
                password
            });

            if (result.success) {
                showAlert('Registration successful! Now login.', 'success');
                document.getElementById('registerUsername').value = '';
                document.getElementById('registerEmail').value = '';
                document.getElementById('registerPassword').value = '';
                document.getElementById('loginUsername').value = username;
            } else {
                showAlert(`Registration failed: ${result.error}`, 'error');
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showAlert('Please enter username and password', 'error');
                return;
            }

            const result = await apiCall('POST', '/auth/login', {
                username,
                password
            });

            if (result.success) {
                token = result.data.access_token;
                localStorage.setItem('token', token);
                showAlert('Login successful!', 'success');
                document.getElementById('loginPassword').value = '';
                showTasksSection();
                loadTasks();
                connectWebSocket();
            } else {
                showAlert(`Login failed: ${result.error}`, 'error');
            }
        }

        function logout() {
            token = null;
            localStorage.removeItem('token');
            showAlert('Logged out successfully', 'success');
            showAuthSection();
            document.getElementById('tasksList').innerHTML = '<div class="empty-state"><p>No tasks yet. Create one above!</p></div>';
        }

        // Task Functions
        async function createTask() {
            const title = document.getElementById('taskTitle').value.trim();
            const description = document.getElementById('taskDescription').value.trim();
            const dueDate = document.getElementById('taskDueDate').value;

            if (!title) {
                showAlert('Task title is required', 'error');
                return;
            }

            const body = { title };
            if (description) body.description = description;
            if (dueDate) body.due_date = dueDate;

            // If editing, use PUT; otherwise POST
            if (editingTaskId) {
                const result = await apiCall('PUT', `/tasks/${editingTaskId}`, body);
                if (result.success) {
                    showAlert('Task updated successfully!', 'success');
                    document.getElementById('taskTitle').value = '';
                    document.getElementById('taskDescription').value = '';
                    document.getElementById('taskDueDate').value = '';
                    document.querySelector('button[onclick="createTask()"]').textContent = 'Add Task';
                    editingTaskId = null;
                    loadTasks();
                } else {
                    showAlert(`Failed to update task: ${result.error}`, 'error');
                }
            } else {
                const result = await apiCall('POST', '/tasks/', body);
                if (result.success) {
                    showAlert('Task created successfully!', 'success');
                    document.getElementById('taskTitle').value = '';
                    document.getElementById('taskDescription').value = '';
                    document.getElementById('taskDueDate').value = '';
                    loadTasks();
                } else {
                    showAlert(`Failed to create task: ${result.error}`, 'error');
                }
            }
        }

        async function loadTasks() {
            const result = await apiCall('GET', '/tasks/');

            const tasksList = document.getElementById('tasksList');

            if (result.success) {
                const tasks = result.data;

                if (tasks.length === 0) {
                    tasksList.innerHTML = '<div class="empty-state"><p>No tasks yet. Create one above!</p></div>';
                    return;
                }

                tasksList.innerHTML = tasks.map(task => `
                    <div class="task-item ${task.is_completed ? 'completed' : ''}" id="task-${task.id}">
                        <div class="task-content">
                            <div class="task-title">${escapeHtml(task.title)}</div>
                            ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                            <div class="task-meta">
                                ${task.due_date ? `<span class="task-due-date">📅 Due: ${task.due_date}</span>` : ''}
                                ${task.due_date ? ' • ' : ''}
                                <span>Created: ${new Date(task.created_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                        <div class="task-actions">
                            ${!task.is_completed ? `<button class="success" onclick="completeTask(${task.id})">✓ Complete</button>` : ''}
                            <button onclick="editTask(${task.id})">Edit</button>
                            <button class="danger" onclick="deleteTask(${task.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            } else {
                tasksList.innerHTML = '<div class="empty-state"><p>Error loading tasks</p></div>';
            }
        }

        async function completeTask(id) {
            const result = await apiCall('PATCH', `/tasks/${id}/complete`);

            if (result.success) {
                loadTasks();
            } else {
                showAlert(`Failed to complete task: ${result.error}`, 'error');
            }
        }

        async function editTask(id) {
            const result = await apiCall('GET', `/tasks/${id}`);

            if (result.success) {
                const task = result.data;
                document.getElementById('taskTitle').value = task.title;
                document.getElementById('taskDescription').value = task.description || '';
                document.getElementById('taskDueDate').value = task.due_date || '';

                // Mark as editing
                editingTaskId = id;
                document.querySelector('button[onclick="createTask()"]').textContent = 'Update Task';

                window.scrollTo(0, 0);
            }
        }

        async function deleteTask(id) {
            if (!confirm('Are you sure you want to delete this task?')) {
                return;
            }

            const result = await apiCall('DELETE', `/tasks/${id}`);

            if (result.success) {
                loadTasks();
            } else {
                showAlert(`Failed to delete task: ${result.error}`, 'error');
            }
        }

        // Utility function
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>

</html>
